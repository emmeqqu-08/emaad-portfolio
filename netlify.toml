# Netlify build + hosting config

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: send all client-side routes to index.html so
# /works and /about resolve on refresh. The /admin and /uploads
# paths are real files and are matched before this catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
