# Build the Vite site and deploy it to GitHub Pages on every push to main.
# Enable this in the repo: Settings → Pages → Build and deployment →
# Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # BASE_PATH controls the Vite base. For a project page the site is
      # served under /<repo>/, so we derive it from the repo name. If you
      # move to a custom domain or a <user>.github.io repo, set
      # BASE_PATH: "/" here instead.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
