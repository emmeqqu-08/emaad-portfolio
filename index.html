<!doctype html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- GitHub Pages SPA fallback decoder: if we arrived via 404.html's
         redirect (path stashed in the query as "/?/..."), rewrite the URL
         back to the real path before React Router boots. Must run first. -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>

    <meta name="description" content="Selected works of Emaad — painting, illustration, and photography." />
    <meta property="og:title" content="Emaad — Selected Works" />
    <meta property="og:description" content="Painting, illustration, and photography." />
