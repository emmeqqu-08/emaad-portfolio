<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <!--
      GitHub Pages SPA fallback (technique by rafgraph/spa-github-pages).
      Pages has no server rewrites, so a deep link like /emaad-portfolio/works
      would 404. Pages serves THIS file for unknown paths; we encode the
      requested path into a query string and bounce to the app's index.html,
      which decodes it back (see the snippet in index.html) before the router
      boots. pathSegmentsToKeep=1 keeps the /<repo>/ project-page base.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
