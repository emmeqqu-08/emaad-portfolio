# =============================================================
# Decap CMS configuration
# The friendly dashboard used to add art at /admin.
#
# Auth: GitHub OAuth. Decap needs a small OAuth handler to complete the
# GitHub login handshake (GitHub Pages can't run one). We point at a
# community-hosted OAuth proxy via `base_url` + `auth_endpoint` below.
#
#   >>> REPLACE base_url with your OAuth proxy origin. <<<
#   See the README ("Deploying on GitHub Pages") for how to get one —
#   either use a community proxy or deploy the tiny free proxy yourself.
#
# Whoever logs in must be a COLLABORATOR on the repo below. If you
# transfer the repo, update `repo` to "<new-owner>/emaad-portfolio".
# =============================================================

backend:
  name: github
  repo: shaadqrsh/emaad-portfolio
  branch: main
  # OAuth proxy is hosted as serverless functions on the nanorewind-4k
  # Vercel project (api/decap/auth + api/decap/callback).
  #   >>> REPLACE with that project's real domain. <<<
  base_url: https://nanorewind-4k.vercel.app
  auth_endpoint: api/decap/auth

# Local dev: run `npx decap-server` and visit /admin to test
# without touching GitHub. Ignored in production.
local_backend: true

# Where uploaded images are stored in the repo, and how they are
# referenced. Stored root-relative as /uploads/<file>; the site prepends
# its base path at runtime (see assetUrl in src/lib/content.js), so the
# markdown stays portable across hosts/subpaths.
media_folder: "public/uploads"
public_folder: "/uploads"

# Nicer commit messages in the GitHub history.
site_url: /
display_url: /
logo_url: /favicon.svg

collections:
  - name: "works"
    label: "Artworks"
    label_singular: "Artwork"
    folder: "src/content/works"
    create: true
    slug: "{{year}}-{{slug}}"
    summary: "{{title}} ({{year}})"
    sortable_fields: [uploadDate, year, title]
    view_filters:
      - label: "Available"
        field: available
        pattern: true
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - {
          name: "image",
          label: "Artwork image",
          widget: "image",
          hint: "Upload a web-friendly image (JPG/PNG/WebP, ideally under ~2 MB).",
        }
      - {
          name: "description",
          label: "Description",
          widget: "text",
          hint: "A short note about the piece.",
        }
      - {
          name: "categories",
          label: "Categories / Tags",
          widget: "relation",
          collection: "settings",
          file: "site",
          value_field: "categories.*",
          search_fields: ["categories.*"],
          display_fields: ["categories.*"],
          multiple: true,
          min: 1,
          hint: "Pick one or more. Manage the master list in Site Settings → Categories.",
        }
      - {
          name: "year",
          label: "Year created",
          widget: "number",
          value_type: "int",
          min: 1900,
          max: 2100,
          required: false,
        }
      - {
          name: "medium",
          label: "Medium",
          widget: "string",
          required: false,
          hint: "e.g. Oil on canvas, Digital · Procreate, 35mm film.",
        }
      - {
          name: "dimensions",
          label: "Dimensions",
          widget: "string",
          required: false,
          hint: "e.g. 60 × 80 cm (leave blank for digital work).",
        }
      - {
          name: "available",
          label: "Available / for sale",
          widget: "boolean",
          default: false,
          required: false,
        }
      - {
          name: "uploadDate",
          label: "Date added",
          widget: "datetime",
          default: "",
          hint: "Auto-set to now; used for 'Newest' sorting.",
        }

  # ---------------------------------------------------------------
  # Site settings: everything in src/content/site.json, editable
  # from the dashboard — name, statement, portrait, socials, and
  # the hand-picked "Selected" works on the home page.
  # ---------------------------------------------------------------
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "General / Home / About"
        file: "src/content/site.json"
        fields:
          - {
              name: "siteTitle",
              label: "Browser tab title / link title",
              widget: "string",
              hint: "Shows in the browser tab and as the title when the site link is shared. e.g. Emaad — Selected Works.",
            }
          - {
              name: "metaDescription",
              label: "Link preview description",
              widget: "text",
              hint: "The blurb shown when the site link is pasted into social media / chat. Keep it under ~160 characters.",
            }
          - { name: "artistName", label: "Artist name", widget: "string" }
          - {
              name: "tagline",
              label: "Tagline",
              widget: "string",
              hint: "Short line under the name, e.g. Painting · Illustration · Photography.",
            }
          - {
              name: "heroStatement",
              label: "Home hero statement",
              widget: "text",
              hint: "The italic sentence on the home page.",
            }
          - {
              name: "heroPortrait",
              label: "Hero portrait (photo of the artist)",
              widget: "image",
              required: false,
              hint: "Optional. Shows beside your name on the home page. Leave empty for a text-only hero.",
            }
          - {
              name: "aboutImage",
              label: "About page image",
              widget: "image",
              required: false,
              hint: "Optional. A studio/portrait photo shown on the About page. Leave empty to hide.",
            }
          - {
              name: "email",
              label: "Contact email",
              widget: "string",
              required: false,
            }
          - {
              name: "categories",
              label: "Categories (master list)",
              widget: "list",
              required: false,
              hint: "Add or remove the categories used across the site. These are the options you can tag artworks with and the filters shown on the Works page.",
              default: ["Painting", "Illustration", "Photography"],
            }
          - name: "socials"
            label: "Social links"
            widget: "list"
            required: false
            label_singular: "Social link"
            summary: "{{fields.platform}}"
            hint: "Add any platforms — Instagram, LinkedIn, DeviantArt, ArtStation, etc."
            fields:
              - { name: "platform", label: "Platform name", widget: "string", hint: "e.g. LinkedIn, DeviantArt." }
              - { name: "url", label: "Link", widget: "string", hint: "Full URL, e.g. https://linkedin.com/in/you." }
              - name: "icon"
                label: "Icon"
                widget: "select"
                required: false
                default: "website"
                hint: "Pick the icon for this link."
                options:
                  - { label: "Instagram", value: "instagram" }
                  - { label: "LinkedIn", value: "linkedin" }
                  - { label: "DeviantArt", value: "deviantart" }
                  - { label: "ArtStation", value: "artstation" }
                  - { label: "Behance", value: "behance" }
                  - { label: "X / Twitter", value: "x" }
                  - { label: "Facebook", value: "facebook" }
                  - { label: "YouTube", value: "youtube" }
                  - { label: "TikTok", value: "tiktok" }
                  - { label: "Pinterest", value: "pinterest" }
                  - { label: "Dribbble", value: "dribbble" }
                  - { label: "Website (globe)", value: "website" }
          - {
              name: "featured",
              label: "Selected works (home page)",
              widget: "relation",
              collection: "works",
              search_fields: ["title"],
              value_field: "{{slug}}",
              display_fields: ["title"],
              multiple: true,
              required: false,
              min: 0,
              max: 6,
              hint: "Pick which pieces appear in the home 'Selected' strip. Leave empty to auto-show your newest work.",
            }
          - {
              name: "aboutBody",
              label: "About page text",
              widget: "text",
              hint: "Your artist statement. Separate paragraphs with a blank line.",
            }
